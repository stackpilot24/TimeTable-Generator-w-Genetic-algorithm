# Render Blueprint — lets you deploy this app in one click from the repo.
# In Render: New + -> Blueprint -> pick this repo. It reads this file.
services:
  - type: web
    name: timetable-generator
    runtime: python
    plan: free
    region: singapore          # closest free region to India; change if you like
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true    # Render generates a strong random value
      - key: DATABASE_URL
        sync: false            # you paste your Supabase URL in the dashboard (kept secret)
